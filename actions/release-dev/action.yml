name: "Release Dev"
description: "Releases a package as a pre-release version on npm."
inputs:
  package:
    description: "The published name of the package to release"
    required: true
  tag:
    description: "Pre-release tag to publish under (e.g. alpha, beta)"
    default: "alpha"
  dry:
    description: "Perform a dry run that skips publishing, deprecation, and the commit"
    default: "false"
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
    - run: bun $GITHUB_ACTION_PATH/index.ts
      shell: bash
      env:
        INPUT_DRY: ${{ inputs.dry }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_TAG: ${{ inputs.tag }}
